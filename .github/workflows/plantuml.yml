#action file generated by copilot
name: generate-plantuml-diagrams
run-name: ${{ github.actor }} updated the puml diagrams. 

on:
  push:
    paths:
      - "Docs/diagrams/**/*.puml"
  workflow_dispatch:

jobs:
  plantuml:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # allows pushing generated SVGs back to repo

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Graphviz
        run: sudo apt-get update && sudo apt-get install -y graphviz

      - name: Download PlantUML jar
        run: |
          curl -L -o plantuml.jar \
            https://github.com/plantuml/plantuml/releases/download/v1.2024.7/plantuml-1.2024.7.jar

      - name: Render .puml to .svg
        run: |
          find Docs/diagrams -name '*.puml' \
            -exec java -jar plantuml.jar -tsvg -o . {} +

      - name: Commit rendered diagrams
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add Docs/diagrams/**/*.svg

          if git diff --cached --quiet; then
            echo "No diagram changes to commit."
            exit 0
          fi

          git commit -m "docs: auto-render PlantUML diagrams"
          git push
