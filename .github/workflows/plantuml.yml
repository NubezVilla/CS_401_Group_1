#Workflow file generated by copilot
name: Render PlantUML diagrams

on:
  push:
    paths:
      - "docs/diagrams/**/*.puml"
  workflow_dispatch:

jobs:
  plantuml:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Graphviz
        run: sudo apt-get update && sudo apt-get install -y graphviz

      - name: Download PlantUML
        run: |
          curl -L -o plantuml.jar \
          https://github.com/plantuml/plantuml/releases/latest/download/plantuml.jar

      - name: Render all .puml recursively
        run: |
          find docs/diagrams -type f -name "*.puml" \
            -exec java -jar plantuml.jar -tsvg {} \;

      - name: Commit generated SVGs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Add all SVGs recursively
          find docs/diagrams -type f -name "*.svg" -print0 | xargs -0 git add

          # Only commit if there are changes
          if git diff --cached --quiet; then
            echo "No diagram changes to commit."
            exit 0
          fi

          git commit -m "docs: auto-render PlantUML diagrams"
          git push
